services:
  web:
    build: .
    container_name: tiempo_web
    ports:
      - "80:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: mariobd
      DB_PASS: abcd
      DB_NAME: mariodb
    restart: on-failure

  db:
    image: mariadb:10.6
    container_name: tiempo_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: mariodb
      MYSQL_USER: mariobd
      MYSQL_PASSWORD: abcd
      MYSQL_INITDB_SKIP_TZINFO: 1
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: on-failure

volumes:
  db_data:
